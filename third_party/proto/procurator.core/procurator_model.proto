// Таблица активных хостов с проверкой через дисковые HB
message HostsByHB {
  repeated HostByHB hosts = 1;
}

message HostByHB {
  // UUID Хоста
  string uuid = 1;
  // Активен или нет
  bool alive = 2;
  // Количество пропущенных проверок
  int32 missed = 3;
  // Последняя успешная проверка
  string last_seen_ago = 4;
}

message CfgFront {
  string key = 1; // имя переменной
  google.protobuf.Value value = 2;
  string summary = 3; // описание
  string type = 4;    // тип переменной
  CfgFrontValidateConditions validation = 5;
}

message CfgGetResponse {
  repeated CfgFront values = 1;
}

message CfgFrontValidateConditions {
  google.protobuf.Value min = 1;
  google.protobuf.Value max = 2;
  google.protobuf.Value equal = 3;
  google.protobuf.Value not_equal = 4;
  string format = 5;
}

message CfgFrontValidationErr {
  string key = 1;
  google.protobuf.Value value = 2;
  string error = 3;
}

message CfgSetRequest {
  repeated CfgFront values = 1;
}

message CfgSetResponse {
  repeated CfgFrontValidationErr val_errs = 1;
}

message  ListUSBDevicesResponse {
  repeated USBDevice items = 1;
}

message USBDevice {
  int64 vendor_id = 1;           // hex -> число (0x10ee)
  string vendor_name = 2;
  int64 product_id = 3;          // hex -> число
  string product_name = 4;
  USBClass class = 5;
  string serial = 6;

  string bus = 7;                // "001"
  string device = 8;             // "004"
  string addr_sys_usb = 9;       // "1-2.3"

  repeated USBInterface interfaces = 10;

  USBPassthroughStatus passthrough = 11;
  string owner_deployment_name = 12;
  string owner_name = 13;
}

message USBInterface {
  USBClass class = 1;
  string sub_class = 2;
  string driver = 3;
}

enum USBPassthroughStatus {
  USB_PASSTHROUGH_STATUS_NOT_CONFIGURABLE = 0;
  USB_PASSTHROUGH_STATUS_ENABLE = 1;
  USB_PASSTHROUGH_STATUS_DISABLE = 2;
  USB_PASSTHROUGH_STATUS_PASSTHROUGHED = 3;
}

enum USBClass {
  USB_CLASS_UNDEFINED = 0;
  USB_CLASS_PER_INTERFACE = 1;
  USB_CLASS_AUDIO = 2;
  USB_CLASS_COMMUNICATIONS = 3;
  USB_CLASS_HUMAN_INTERFACE_DEVICE = 4;
  USB_CLASS_PHYSICAL = 5;
  USB_CLASS_IMAGE = 6;
  USB_CLASS_PRINTER = 7;
  USB_CLASS_MASS_STORAGE = 8;
  USB_CLASS_HUB = 9;
  USB_CLASS_CDC_DATA = 10;
  USB_CLASS_SMART_CARD = 11;
  USB_CLASS_CONTENT_SECURITY = 12;
  USB_CLASS_VIDEO = 13;
  USB_CLASS_PERSONAL_HEALTHCARE = 14;
  USB_CLASS_AUDIO_VIDEO = 15;
  USB_CLASS_BILLBOARD = 16;
  USB_CLASS_TYPE_C_BRIDGE = 17;
  USB_CLASS_DIAGNOSTIC = 18;
  USB_CLASS_WIRELESS = 19;
  USB_CLASS_APPLICATION_SPECIFIC_1 = 20;
  USB_CLASS_DIAGNOSTIC_DEVICE = 21;
  USB_CLASS_WIRELESS_CONTROLLER = 22;
  USB_CLASS_MISCELLANEOUS = 23;
  USB_CLASS_APPLICATION_SPECIFIC_2 = 24;
  USB_CLASS_VENDOR_SPECIFIC = 25;
}

// Хранилище резервных копий
message MonitoringEventBackupStorage {
  string name = 1;                    // Название хранилища
  int32 type = 2;                     // Тип хранилища (1, 2, 3 или другое числовое значение)
  string location = 3;                // Локация хранилища
  uint32 state = 4;                   // Состояние хранилища
  BackupStorageCapacity capacity = 5; // Данные по заполняемости хранилища
}

// Бакет резервных копий ВМ
message MonitoringEventBucket {
  string backup_storage_id = 1;       // Идентификатор хранилища резервных копий
  string vm_id = 2;                   // Идентификатор виртуальной машины
  uint32 state = 3;                   // Состояние
  string last_name = 4;               // Имя ВМ в последнем бэкапе
  int32 backups_count = 5;            // Количество бэкапов
  int64 size = 6 [deprecated = true]; // Размер 2026
  int64 last_backup = 7;              // Последний бэкап (unixtime)
  double used_size_mb = 8;            // Занимаемое в хранилище место
}

enum UpdateOperationState {
  VS_UNDEFINED = 0;
  VS_CAN_UPDATE = 1; // можно делать update
  VS_CANT_UPDATE = 2; // нельзя делать update
  VS_CANT_UPDATE_CRITICAL = 3; // нельзя делать update и выходим из update с ошибкой
  VS_UPDATE_SUCCESS = 4; // update успешно прошёл
  VS_UPDATE_PATRIAL_SUCCESS = 5; // update прошёл частично успешно - можно обновить описатель, но не все операции выполнены (при удалении диска из вм детач диска прошёл, но удалить соурс не удалось)
  VS_UPDATE_FAIL = 6; // update не прошёл
}


message UpdateOperation {
  UpdateOperationType operation_type = 1; // тип операции update vm
  UpdateOperationState state = 2; // статус операции update vm
  string message_err = 3;  // содержание ошибки операции update vm
}

message UpdateOperations {
  repeated UpdateOperation update_operation = 1;
}

message UploadSession {
  optional string file_id = 1; // not required
  string file_name = 2; // required file name который клиент загружает на сервер
  uint64 file_size = 3; // required
  uint32 chunk_size = 4; // required
  optional int32 total_chunks = 5; // not required
  string path = 6; // required путь в прокураторе
  repeated int32 bit_map = 7; // not required перечень успешно загруженных чанков
  optional int64 start = 8; // not required время инициации загрузки, юникс
  optional UploadStatus status = 9; // not required
}

enum UploadStatus {
  UNDEFINED = 0;
  PENDING = 1;
  IN_PROGRESS = 2;
  FAILED = 3;
  SUCCESS = 4;
}

message UploadActionRequest {
  string id = 1;
  optional int32 chunk_num = 2;
  bytes chunk = 3;
}

message UploadSessionList {
  repeated UploadSession sessions = 1;
}

message UploadChunkResponse {
  int32 upload_chunks = 1;
  bool completed = 2;
  repeated int32 chunks_with_errors = 3;
  repeated string chunks_write_errors = 4;
}