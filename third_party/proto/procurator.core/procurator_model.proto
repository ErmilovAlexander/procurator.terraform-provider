  string adapter = 4;
}

// Sysx configuration object (TOP)
message SysxInfo {
  string id = 1;
  State state = 2;
  optional ListIndex index = 3;

  string switch = 4;
  string network_id = 5;
  string tcp_stack = 6;
  Services services = 7;
  uint32 mtu = 8;
  IPv4Settings ipv4_settings = 9;
  string mac = 10;
}

// Services configuration object for Sysx
message Services {
  bool Management = 1;
  bool VMotion = 2;
  bool Provisioning = 3;
  bool VSAN = 4;
  bool FaultToleranceLogging = 5;
  bool VSphereReplication = 6;
  bool VSphereReplicationNFC = 7;
  bool VSphereBackupNFC = 8;
  bool NVMeOverTCP = 9;
  bool NVMeOverRDMA = 10;
}

// IPv4 settings configuration object for Sysx
message IPv4Settings {
  bool auto = 1;
  fixed32 ipv4 = 2;
  fixed32 mask = 3;
  bool gateway_override = 4;
  optional fixed32 gateway = 5;
  uint32 routing_table = 6;
}

// security configuration object
message Security {
  YNIOption promiscuous = 1;
  YNIOption mac_change = 2;
  YNIOption forged_transmits = 3;

  YNIOption promiscuous_computed = 4;
  YNIOption mac_change_computed = 5;
  YNIOption forged_transmits_computed = 6;
}

// represent 3 variant boolean configuration option value
enum YNIOption {
  INHERIT = 0;
  YES = 1;
  NO = 2;
}

// shaping configuration object
message Shaping {
  bool inherit = 1;
  bool enabled = 2;
  int64 average_bw = 3;
  int64 peak_bw = 4;
  int64 burst_size = 5;
}

// teaming configuration object
message Teaming {
  enum Mode {
    TEAM_MODE_INHERIT = 0;
    TEAM_MODE_ACTIVE_BACKUP = 1;
    TEAM_MODE_SLB = 2;
    TEAM_MODE_TCP = 3;
  }
  enum LinkDetectionMode {
    TEAM_LINK_DETECT_INHERIT = 0;
    TEAM_LINK_DETECT_CARIER = 1;
    TEAM_LINK_DETECT_BEAKON = 2;
  }
  Mode mode = 1;
  LinkDetectionMode link_detection_mode = 2;
  YNIOption notify_switches = 3;
  YNIOption failback = 4;

  Mode mode_computed = 5;
  LinkDetectionMode link_detection_mode_computed = 6;
  YNIOption notify_switches_computed = 7;
  YNIOption failback_computed = 8;
}

// NICs configuration object
message NICs {
  repeated string active = 1;
  repeated string standby = 2;
  repeated string unused = 3;
  repeated string connected = 4;
  bool inherit = 5;
}

// UpdateLock - блокировка update виртуальной машины
message UpdateLock {
  uint64 create_time = 1; // время создания
  ProcuratorVirtualMachine old_pvm = 2; // описатель vm перед update
  ProcuratorVirtualMachine req_pvm = 3; // описатель vm который был в запросе фронта
  repeated UpdateOperationLock update_operations = 4; // список операций апдейта
}

// UpdateOperationLock - операция update vm со статусом, ошибками и аргументами
message UpdateOperationLock {
  UpdateOperationType operation_type = 1; // тип операции update vm
  enum OperationState {
    VS_UNDEFINED = 0;
    VS_CAN_UPDATE = 1; // можно делать update
    VS_CANT_UPDATE = 2; // нельзя делать update
    VS_CANT_UPDATE_CRITICAL = 3; // нельзя делать update и выходим из update с ошибкой
    VS_UPDATE_SUCCESS = 4; // update успешно прошёл
    VS_UPDATE_PATRIAL_SUCCESS = 5; // update прошёл частично успешно - можно обновить описатель, но не все операции выполнены (при удалении диска из вм детач диска прошёл, но удалить соурс не удалось)
    VS_UPDATE_FAIL = 6; // update не прошёл
  }
  OperationState state = 2; // статус операции update vm
  string message_err = 3;  // содержание ошибки операции update vm
  int32 err = 4; // идентификатор ошибки update vm
}

// UpdateOperationType - перечень операций, которые может выполнить update vm
enum UpdateOperationType {
  // Неопределённое значение
  O_UNDEFINED = 0;

  // CPU
  O_CPU_VCPU = 1;
  O_CPU_OTHER = 2;

  // Memory
  O_MEMORY_SIZE_CHANGE = 3;
  O_MEMORY_HP_RES_LIM_CHANGE = 4;

  // Disk devices
